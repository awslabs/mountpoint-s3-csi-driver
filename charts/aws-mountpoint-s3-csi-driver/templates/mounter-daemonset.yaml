{{- if eq .Values.experimental.mounterMode "daemonset" }}
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: aws-s3-csi-daemonset-mounter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aws-mountpoint-s3-csi-driver.labels" . | nindent 4 }}
spec:
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: aws-s3-csi-daemonset-mounter
      {{- include "aws-mountpoint-s3-csi-driver.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: aws-s3-csi-daemonset-mounter
        {{- include "aws-mountpoint-s3-csi-driver.labels" . | nindent 8 }}
        {{- with .Values.mounterDaemonset.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        {{- with .Values.mounterDaemonset.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      priorityClassName: system-node-critical
      {{- with .Values.mounterDaemonset.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        {{- if .Values.mounterDaemonset.tolerateAllTaints }}
        - operator: Exists
        {{- end }}
        {{- with .Values.mounterDaemonset.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mounterDaemonset.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      containers:
      - name: mounter
        image: {{ include "csiDriverImageName" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/aws-s3-csi-daemonset-mounter
        args:
          - --comm-dir=/comm
          - --mountpoint-bin-dir=/mountpoint-s3/bin
          - --v={{ .Values.node.logLevel }}
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: comm
            mountPath: /comm
        {{- with .Values.mounterDaemonset.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      volumes:
      - name: comm
        emptyDir: {}
{{- end }}
